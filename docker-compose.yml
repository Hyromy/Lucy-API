services:
  db:
    image: postgres:18-alpine
    container_name: lucy_db
    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "postgres"

    volumes:
      - lucy_db_data:/var/lib/postgresql/data

    networks:
      - lucy_network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lucy_redis
    ports:
      - "6379:6379"

    networks:
      - lucy_network

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: lucy_api
    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      PRODUCTION: "True"
      CORS_ALLOWED: "http://localhost:5173, http://127.0.0.1:5173"
      CSRF_TRUSTED: "http://localhost:5173, http://127.0.0.1:5173"
      PG_DB: postgres
      PG_USER: postgres
      PG_PASS: postgres
      PG_HOST: db
      REDIS_URL: redis://redis:6379/0

    networks:
      - lucy_network

    depends_on:
      db:
        condition: service_healthy

      redis:
        condition: service_healthy

volumes:
  lucy_db_data:

networks:
  lucy_network:
